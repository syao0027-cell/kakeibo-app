<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>家計簿</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#7FAE7B">
<link rel="apple-touch-icon" href="icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<link rel="stylesheet" href="style.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>

<div class="leaf-bg-top-left"></div>
<div class="leaf-bg-top-right"></div>

<div class="container">

    <section id="home-tab" class="tab-content active">
        <header class="app-header">
            <div class="header-title-area">
                <div class="header-sparrow-left">
                    <img src="icon.png" alt="チュンちゃん">
                </div>
                <h1>家計簿</h1>
            </div>
            <div class="header-bell">🔔</div>
        </header>

        <div class="home-period-filter">
            <div class="select-styled-wrap">
                <select id="home-date-picker" onchange="onHomePeriodChange()"></select>
            </div>
        </div>

        <div class="summary-card-rich">
            <div class="summary-main-balance">
                <div class="label">今月の収支</div>
                <div class="amount" id="monthlyBalance">¥0</div>
            </div>
            <div class="summary-row-two-col">
                <div class="summary-col income">
                    <div class="summary-icon-circle">🌱</div>
                    <div class="summary-col-data">
                        <div class="label">今月収入</div>
                        <div class="amount" id="monthlyIncome">¥0</div>
                    </div>
                </div>
                <div class="summary-col expense">
                    <div class="summary-icon-circle">👛</div>
                    <div class="summary-col-data">
                        <div class="label">今月支出</div>
                        <div class="amount" id="monthlyExpense">¥0</div>
                    </div>
                </div>
            </div>
        </div>

        <h2 class="section-headline">✨ よく使う項目</h2>
        <div class="favorites-scroller-rich" id="favorites"></div>

        <h2 class="section-headline">📝 履歴明細</h2>
        <div id="history"></div>
    </section>

    <section id="form-tab" class="tab-content">
        <header class="app-header">
            <h1>データを記録する</h1>
        </header>
        
        <div class="card">
            <div class="radio-group-rich">
                <input type="radio" id="type-expense" name="type" value="expense" checked>
                <label for="type-expense" class="radio-label-rich">支出</label>
                <input type="radio" id="type-income" name="type" value="income">
                <label for="type-income" class="radio-label-rich">収入</label>
            </div>

            <div class="form-group-rich">
                <label for="amount">金額</label>
                <input type="number" id="amount" inputmode="numeric" placeholder="¥ 0">
            </div>

            <div class="form-group-rich">
                <label for="category">カテゴリ</label>
                <select id="category">
                    <option value="食費">🛒 食費</option>
                    <option value="日用品">🏡 日用品</option>
                    <option value="交通費">🚗 交通費</option>
                    <option value="趣味">🎮 趣味</option>
                    <option value="その他">🏷️ その他</option>
                </select>
            </div>

            <div class="form-group-rich">
                <label for="memo">メモ</label>
                <input type="text" id="memo" placeholder="品名やお店の名前など">
            </div>

            <div class="form-group-rich">
                <label for="date">日付</label>
                <input type="date" id="date">
            </div>

            <button id="saveBtn" class="primary-btn-rich">登録する</button>
        </div>
    </section>

    <section id="summary-tab" class="tab-content">
        <header class="app-header">
            <h1>家計レポート</h1>
        </header>

        <div class="period-select">
            <button id="btn-monthly" class="period-btn active">月間</button>
            <button id="btn-yearly" class="period-btn">年間</button>
        </div>

        <div class="card" style="text-align: center;">
            <div class="home-period-filter" style="text-align: center; margin-bottom: 16px;">
                <div class="select-styled-wrap">
                    <select id="report-period-picker"></select>
                </div>
            </div>
            <h3 id="report-title" style="margin: 10px 0; font-size: 16px; color: #3C3A35;">支出合計: ¥0</h3>
            
            <div class="chart-box-rich">
                <div class="pie-chart-rich" id="category-pie-chart"></div>
            </div>

            <div id="category-report" style="margin-top: 20px; text-align: left;"></div>
        </div>
    </section>

    <section id="settings-tab" class="tab-content">
        <header class="app-header">
            <h1>アプリ設定</h1>
        </header>

        <div class="card">
            <h2>データ管理</h2>
            <button id="exportCsvBtn" class="primary-btn-rich" style="background: #A2A09B; box-shadow: none; margin-bottom: 14px;">
                📥 CSVバックアップ出力
            </button>

            <label class="csv-import-label">
                📤 CSVファイルをインポート
                <input type="file" id="importCsvFile" accept=\".csv\" style="display:none;">
            </label>
        </div>

        <div class="card">
            <h2 style="color:#E79A82;">危険な操作</h2>
            <button id="clearDataBtn" class="delete-btn" style="width:100%; padding:14px; font-size:14px;">
                データをすべて初期化する
            </button>
        </div>
    </section>

</div>

<div class="sparrow-avatar-fixed">
    <div class="sparrow-balloon-rich" id="sparrow-speech">今日も記録しよう♪</div>
    <div class="sparrow-watercolor-wrapper">
        <img src="icon.png" alt="チュンちゃん" id="sparrow-icon">
    </div>
</div>

<nav class="bottom-nav-rich">
    <button data-tab="home-tab" class="nav-item-btn active">
        <span class="nav-icon">🏠</span>
        <span class="nav-label">ホーム</span>
    </button>
    <button data-tab="form-tab" class="nav-item-btn">
        <div class="center-add-button">＋</div>
        <span class="nav-label" style="margin-top:28px;">登録</span>
    </button>
    <button data-tab="summary-tab" class="nav-item-btn">
        <span class="nav-icon">📊</span>
        <span class="nav-label">集計</span>
    </button>
    <button data-tab="settings-tab" class="nav-item-btn">
        <span class="nav-icon">⚙️</span>
        <span class="nav-label">設定</span>
    </button>
</nav>

</body>
</html>
